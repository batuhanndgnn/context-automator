name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    # NOT: runs-on windows-latest secildi cunku proje bilincli olarak
    # Windows'a ozel (APPDATA/LOCALAPPDATA, .cmd executable'lar). Linux
    # runner'da IDE-adapter testleri anlamli olmazdi.
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure git identity (testler icin gerekli)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Runner"

      - name: Install project + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest tests/ -v --cov=context_automator --cov-report=term-missing
