name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # NOT: Once sadece windows-latest vardi ("proje bilincli olarak Windows'a
    # ozel" gerekcesiyle). Bu artik dogru degil -- ide_paths.py, vscode_family.py
    # (get_ide_configs/to_vscode_uri/vscode_uri_to_path) ve ide_launcher.py/
    # file_restorer.py artik macOS ve Linux'u da destekliyor (bkz. ilgili
    # dosyalardaki NOT'lar). Bu yuzden matris ubuntu-latest ve macos-latest'i
    # de icine aliyor; boylece platforma ozel bir regresyon sessizce
    # Windows'ta yesil, digerlerinde kirik kalamiyor.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure git identity (testler icin gerekli)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Runner"

      - name: Install project + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest tests/ -v --cov=context_automator --cov-report=term-missing
